<div class="page">
  <header class="top-bar">
    <span class="app-title">📋 My Lists</span>
    <div class="header-actions">
      <span class="user-name">{{ user()?.name }}</span>
      <button class="icon-btn" title="Back to Apps" (click)="goToApps()">⊞</button>
    </div>
  </header>

  <main class="main">
    @if (loading()) {
      <div class="center-msg">Loading…</div>
    } @else if (lists().length === 0) {
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h2>No lists yet</h2>
        <p>Create your first list to get started</p>
      </div>
    } @else {
      <div class="list-grid">
        @for (list of lists(); track list._id) {
          <app-list-card
            [list]="list"
            (open)="openList(list)"
            (delete)="deleteList($event, list)"
          />
        }
      </div>
    }
  </main>

  <button class="fab" (click)="showCreate = true" title="New list">＋</button>

  @if (showCreate) {
    <app-create-list-modal (create)="createList($event)" (cancel)="showCreate = false" />
  }
</div>
