<div class="dialog-container">
  <!-- Header -->
  <header class="dialog-header">
    <button class="header-btn" type="button" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
    <h2>{{ isEditMode ? 'Edit Recurring' : 'New Recurring' }}</h2>
    <div class="header-spacer"></div>
  </header>

  <div class="form-content">
    <!-- Error Alert -->
    <div *ngIf="submissionError" class="error-alert">
      <mat-icon>error_outline</mat-icon>
      <span>{{ submissionError }}</span>
    </div>

    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
      <!-- Hero Section - Amount -->
      <div class="hero-section">
        <div class="hero-icon green">
          <mat-icon>autorenew</mat-icon>
        </div>
        
        <div class="type-toggle-wrapper" style="margin-bottom: 12px;">
            <mat-button-toggle-group formControlName="type" aria-label="Transaction Type" class="type-toggle">
                <mat-button-toggle value="income">Income</mat-button-toggle>
                <mat-button-toggle value="expense">Expense</mat-button-toggle>
            </mat-button-toggle-group>
        </div>

        <label class="hero-label">Recurring Amount</label>
        <div class="hero-input-wrapper">
          <span class="currency-symbol">$</span>
          <input
            type="number"
            formControlName="amount"
            placeholder="0.00"
            class="hero-input"
            inputmode="decimal"
            step="0.01"
          />
        </div>
        <div class="field-error" *ngIf="f['amount'].touched && f['amount'].invalid">
          Enter a valid amount
        </div>
      </div>

      <!-- Transaction Info Section -->
      <div class="form-section">
        <div class="section-title">
          <mat-icon>description</mat-icon>
          Transaction Details
        </div>

        <div class="form-fields">
          <!-- Name -->
          <div class="field-group">
            <label class="field-label">Name <span class="required">*</span></label>
            <input
              type="text"
              formControlName="name"
              placeholder="e.g. Netflix, Rent, Utilities"
              class="text-input"
              [class.has-error]="f['name'].touched && f['name'].invalid"
            />
            <div class="field-error" *ngIf="f['name'].touched && f['name'].hasError('required')">
              Name is required
            </div>
            <div class="field-error" *ngIf="f['name'].hasError('nameTaken')">
              This name is already taken
            </div>
          </div>

          <!-- Description -->
          <div class="field-group">
            <label class="field-label">Description <span class="required">*</span></label>
            <textarea
              formControlName="description"
              rows="2"
              placeholder="Brief description of this transaction..."
              class="text-input textarea"
              [class.has-error]="f['description'].touched && f['description'].invalid"
            ></textarea>
            <div
              class="field-error"
              *ngIf="f['description'].touched && f['description'].hasError('required')"
            >
              Description is required
            </div>
          </div>
        </div>
      </div>

      <!-- Schedule Section -->
      <div class="form-section">
        <div class="section-title">
          <mat-icon>schedule</mat-icon>
          Schedule
        </div>

        <div class="form-fields">
          <!-- Frequency & Date Row -->
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Frequency <span class="required">*</span></label>
              <select
                formControlName="frequency"
                class="text-input select-input"
                [class.has-error]="f['frequency'].touched && f['frequency'].invalid"
              >
                <option value="" disabled>Select...</option>
                <option *ngFor="let freq of frequencies" [value]="freq">{{ freq }}</option>
              </select>
            </div>

            <div class="field-group">
              <label class="field-label">Start Date <span class="required">*</span></label>
              <div class="date-input-wrapper">
                <input
                  [matDatepicker]="picker"
                  formControlName="startingDate"
                  class="text-input date-input"
                  placeholder="Select date"
                  readonly
                  [class.has-error]="f['startingDate'].touched && f['startingDate'].invalid"
                />
                <mat-datepicker-toggle [for]="picker" class="date-toggle"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Action Buttons -->
  <div class="dialog-actions">
    <button type="button" class="btn btn-cancel" (click)="onCancel()">Cancel</button>

    <button *ngIf="isEditMode" type="button" class="btn btn-delete" (click)="onDelete()">
      <mat-icon>delete_outline</mat-icon>
    </button>

    <button
      type="submit"
      class="btn btn-success"
      [disabled]="transactionForm.invalid || transactionForm.pending"
      (click)="onSubmit()"
    >
      {{ isEditMode ? 'Save Changes' : 'Add Recurring' }}
    </button>
  </div>
</div>
