<div class="dialog-container">
  <!-- Header -->
  <header class="dialog-header">
    <button class="close-btn" type="button" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
    <h2>{{ isEditMode ? 'Edit Transaction' : 'New Transaction' }}</h2>
    <div class="header-spacer"></div>
  </header>

  <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
    <div class="form-content">
      <!-- Amount Section (Prominent) -->
      <div class="amount-section">
        <label class="amount-label">Amount</label>
        <div class="amount-input-wrapper">
          <span class="currency-symbol">$</span>
          <input
            type="number"
            formControlName="amount"
            placeholder="0.00"
            class="amount-input"
            inputmode="decimal"
          />
        </div>
        <div
          class="field-error"
          *ngIf="transactionForm.get('amount')?.touched && transactionForm.get('amount')?.invalid"
        >
          Enter a valid amount
        </div>
      </div>

      <!-- Form Fields -->
      <div class="form-fields">
        <!-- Name -->
        <div class="field-group">
          <label class="field-label">Name</label>
          <input
            type="text"
            formControlName="name"
            placeholder="e.g. Grocery shopping"
            class="text-input"
          />
          <div
            class="field-error"
            *ngIf="
              transactionForm.get('name')?.touched &&
              transactionForm.get('name')?.hasError('required')
            "
          >
            Name is required
          </div>
        </div>

        <!-- Description -->
        <div class="field-group">
          <label class="field-label">Description <span class="optional">(optional)</span></label>
          <textarea
            formControlName="description"
            rows="2"
            placeholder="Add a note..."
            class="text-input textarea"
          ></textarea>
        </div>

        <!-- Date & Type Row -->
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Date</label>
            <div class="date-input-wrapper">
              <input
                [matDatepicker]="picker"
                formControlName="date"
                class="text-input date-input"
                readonly
              />
              <mat-datepicker-toggle [for]="picker" class="date-toggle"></mat-datepicker-toggle>
              <mat-datepicker #picker></mat-datepicker>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Type</label>
            <select formControlName="type" class="text-input select-input">
              <option *ngFor="let t of types" [value]="t">{{ t }}</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="dialog-actions">
      <button *ngIf="isEditMode" type="button" class="delete-btn" (click)="onDelete()">
        <mat-icon>delete_outline</mat-icon>
        Delete
      </button>

      <button
        type="submit"
        class="save-btn"
        [disabled]="transactionForm.invalid"
        [class.full-width]="!isEditMode"
      >
        {{ isEditMode ? 'Save Changes' : 'Create Transaction' }}
      </button>
    </div>
  </form>
</div>
