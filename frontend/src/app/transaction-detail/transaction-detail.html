<div class="dialog-container">
  <!-- Header -->
  <header class="dialog-header">
    <button class="header-btn" type="button" (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
    <h2>{{ isEditMode ? 'Edit Transaction' : 'New Transaction' }}</h2>
    <div class="header-spacer"></div>
  </header>

  <div class="form-content">
    <form [formGroup]="transactionForm" (ngSubmit)="onSubmit()">
      <!-- Hero Section - Amount -->
      <div class="hero-section">
        <div class="hero-icon blue">
          <mat-icon>payments</mat-icon>
        </div>
        <label class="hero-label">Amount</label>
        <div class="hero-input-wrapper">
          <span class="currency-symbol">$</span>
          <input
            type="number"
            formControlName="amount"
            placeholder="0.00"
            class="hero-input"
            inputmode="decimal"
            step="0.01"
          />
        </div>
        <div
          class="field-error"
          *ngIf="transactionForm.get('amount')?.touched && transactionForm.get('amount')?.invalid"
        >
          Enter a valid amount
        </div>
      </div>

      <!-- Transaction Info Section -->
      <div class="form-section">
        <div class="section-title">
          <mat-icon>description</mat-icon>
          Details
        </div>

        <div class="form-fields">
          <!-- Name -->
          <div class="field-group">
            <label class="field-label">Name <span class="required">*</span></label>
            <input
              type="text"
              formControlName="name"
              placeholder="e.g. Grocery shopping"
              class="text-input"
              [class.has-error]="
                transactionForm.get('name')?.touched && transactionForm.get('name')?.invalid
              "
            />
            <div
              class="field-error"
              *ngIf="
                transactionForm.get('name')?.touched &&
                transactionForm.get('name')?.hasError('required')
              "
            >
              Name is required
            </div>
          </div>

          <!-- Description -->
          <div class="field-group">
            <label class="field-label">Description <span class="optional">(optional)</span></label>
            <textarea
              formControlName="description"
              rows="2"
              placeholder="Add a note..."
              class="text-input textarea"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Schedule Section -->
      <div class="form-section">
        <div class="section-title">
          <mat-icon>event</mat-icon>
          When & Type
        </div>

        <div class="form-fields">
          <!-- Date & Type Row -->
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">Date <span class="required">*</span></label>
              <div class="date-input-wrapper">
                <input
                  [matDatepicker]="picker"
                  formControlName="date"
                  class="text-input date-input"
                  placeholder="Select date"
                  readonly
                />
                <mat-datepicker-toggle [for]="picker" class="date-toggle"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
              </div>
            </div>

            <div class="field-group">
              <label class="field-label">Type</label>
              <select formControlName="type" class="text-input select-input">
                <option *ngFor="let t of types" [value]="t">{{ t }}</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Action Buttons -->
  <div class="dialog-actions">
    <button type="button" class="btn btn-cancel" (click)="onCancel()">Cancel</button>

    <button *ngIf="isEditMode" type="button" class="btn btn-delete" (click)="onDelete()">
      <mat-icon>delete_outline</mat-icon>
    </button>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="transactionForm.invalid"
      (click)="onSubmit()"
    >
      {{ isEditMode ? 'Save Changes' : 'Create' }}
    </button>
  </div>
</div>
